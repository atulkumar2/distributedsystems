services:

  # ── Apache Kafka (KRaft, single node) ────────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka-web
    ports:
      # Use the standard host port for local Kafka clients.
      # Spring Boot apps inside Docker use kafka:29092 (internal network) directly.
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_HOST://:9092,PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      # Use the internal PLAINTEXT listener (29092) — the PLAINTEXT_HOST listener (9092)
      # advertises localhost:9092 to clients (host-mapped port), which resolves to the
      # KRaft controller port inside the container and breaks the health check.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Kafka UI dashboard ────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      # Use the common local dashboard port.
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: vehicle-telemetry-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  # ── Producer web app (http://localhost:8081) ──────────────────────────────────
  producer-app:
    build:
      context: .                            # web-apps/ — includes telemetry-model sources
      dockerfile: producer-app/Dockerfile
    container_name: telemetry-producer
    ports:
      - "8081:8081"
    environment:
      # Override the default localhost:9092 to reach Kafka inside Docker network
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Consumer web app (http://localhost:8082) ──────────────────────────────────
  consumer-app:
    build:
      context: .                            # web-apps/ — shared context for consistency
      dockerfile: consumer-app/Dockerfile
    container_name: telemetry-consumer
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
