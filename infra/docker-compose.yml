services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-shared
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: telematics
      POSTGRES_PASSWORD: telematics
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telematics -d telemetry"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      shared:
        aliases:
          - postgres
          - postgres-shared

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka-shared
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_HOST://:9092,PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - shared

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-shared
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: distributedsystems-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - shared

  adminer:
    image: adminer:4
    container_name: adminer-shared
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres-shared
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shared

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer-shared
    command: -H unix:///var/run/docker.sock
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped
    networks:
      - shared

networks:
  shared:
    name: ds-shared

volumes:
  portainer-data:
    name: distributedsystems-portainer-data
  postgres-data:
    name: distributedsystems-postgres-data
