services:
  postgres:
    image: postgres:18-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-ds-telemetry-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-telematics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telematics}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telematics} -d ${POSTGRES_DB:-telemetry}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      shared:
        aliases:
          - ${POSTGRES_CONTAINER_NAME:-ds-telemetry-postgres}

  kafka:
    image: apache/kafka:3.8.0
    container_name: ${KAFKA_CONTAINER_NAME:-kafka-shared}
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_HOST://:9092,PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9092},PLAINTEXT://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - shared

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ${KAFKA_UI_CONTAINER_NAME:-kafka-ui-shared}
    ports:
      - "${KAFKA_UI_HOST_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ds-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - shared

networks:
  shared:
    name: ${SHARED_NETWORK_NAME:-ds-shared}

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME:-ds-telemetry-postgres-data}
