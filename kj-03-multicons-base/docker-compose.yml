services:
  # ── Storage Consumer UI (:8084) ──────────────────────────────────────────────
  # Reads vehicle-telemetry, stores events in memory, routes failures to DLQ.
  # Set SLOW_MODE=true to simulate lag (observable in Kafka UI Consumer Groups tab).
  storage-consumer:
    build:
      context: .                                    # kj-03-multicons-base/ is the build context
      dockerfile: storage-consumer/Dockerfile
    container_name: telemetry-storage-consumer
    ports:
      - "8084:8084"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SLOW_MODE: "false"    # change to "true" to observe lag
    restart: on-failure
    networks:
      - default
      - shared

  # ── Alert Consumer UI (:8083) ────────────────────────────────────────────────
  # Independent consumer group — receives the same messages as storage-consumer
  # (fan-out) and raises alerts for overspeed / low-fuel conditions.
  alert-consumer:
    build:
      context: .
      dockerfile: alert-consumer/Dockerfile
    container_name: telemetry-alert-consumer
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SLOW_MODE: "false"
    restart: on-failure
    networks:
      - default
      - shared

  # ── Producer Web App ──────────────────────────────────────────────────────────
  # Spring Boot UI on port 8081 — send manual or random telemetry events via browser.
  # Visit http://localhost:8081 after starting the stack.
  producer-app:
    build:
      context: .
      dockerfile: producer-app/Dockerfile
    container_name: telemetry-producer
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: on-failure
    networks:
      - default
      - shared

  # ── Consumer Web App ──────────────────────────────────────────────────────────
  # Spring Boot SSE UI on port 8082 — live display of events arriving from Kafka.
  # Visit http://localhost:8082 after starting the stack.
  consumer-app:
    build:
      context: .
      dockerfile: consumer-app/Dockerfile
    container_name: telemetry-consumer
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: on-failure
    networks:
      - default
      - shared

networks:
  shared:
    external: true
    name: ds-shared
