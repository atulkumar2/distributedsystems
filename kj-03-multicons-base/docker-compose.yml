services:

  # ── Apache Kafka (KRaft, single node) ────────────────────────────────────────
  # This is a standalone Kafka stack for the kj-03-multicons-base module.
  # Use the standard local Kafka host port.
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka-streaming
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_HOST://:9092,PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Auto-create topics so vehicle-telemetry and vehicle-telemetry-dlq are
      # available as soon as the first producer or consumer connects.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # 3 partitions for vehicle-telemetry so multiple consumers can read in parallel
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Kafka UI ──────────────────────────────────────────────────────────────────
  # Use the common local dashboard port.
  # Use this to:
  #   - Watch consumer group lag in real time (Consumer Groups tab)
  #   - Browse the DLQ topic to inspect failed events
  #   - Observe partition distribution of messages
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-streaming
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kj-03-multicons-base
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  # ── Storage Consumer UI (:8084) ──────────────────────────────────────────────
  # Reads vehicle-telemetry, stores events in memory, routes failures to DLQ.
  # Set SLOW_MODE=true to simulate lag (observable in Kafka UI Consumer Groups tab).
  storage-consumer:
    build:
      context: .                                    # kj-03-multicons-base/ is the build context
      dockerfile: storage-consumer/Dockerfile
    container_name: telemetry-storage-consumer
    ports:
      - "8084:8084"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SLOW_MODE: "false"    # change to "true" to observe lag
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # ── Alert Consumer UI (:8083) ────────────────────────────────────────────────
  # Independent consumer group — receives the same messages as storage-consumer
  # (fan-out) and raises alerts for overspeed / low-fuel conditions.
  alert-consumer:
    build:
      context: .
      dockerfile: alert-consumer/Dockerfile
    container_name: telemetry-alert-consumer
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SLOW_MODE: "false"
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # ── Producer Web App ──────────────────────────────────────────────────────────
  # Spring Boot UI on port 8081 — send manual or random telemetry events via browser.
  # Visit http://localhost:8081 after starting the stack.
  producer-app:
    build:
      context: .
      dockerfile: producer-app/Dockerfile
    container_name: telemetry-producer-app
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # ── Consumer Web App ──────────────────────────────────────────────────────────
  # Spring Boot SSE UI on port 8082 — live display of events arriving from Kafka.
  # Visit http://localhost:8082 after starting the stack.
  consumer-app:
    build:
      context: .
      dockerfile: consumer-app/Dockerfile
    container_name: telemetry-consumer-app
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
