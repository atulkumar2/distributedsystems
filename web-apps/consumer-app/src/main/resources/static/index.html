<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telemetry Consumer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #a78bfa; margin-bottom: 0.25rem; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-bottom: 2rem; }
    .card { background: #1e293b; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .header-row h2 { font-size: 1rem; font-weight: 600; color: #cbd5e1; }
    .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; font-weight: 600; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; }
    .dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: pulse 2s infinite; }
    .dot.error { background: #f87171; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; color: #64748b; font-weight: 600; border-bottom: 1px solid #334155; white-space: nowrap; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #243044; color: #cbd5e1; }
    tr { transition: background 0.3s; }
    tr.new-row { background: #1a3348; }
    .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; }
    .badge-on   { background: #14532d; color: #4ade80; }
    .badge-idle { background: #1e3a5f; color: #60a5fa; }
    .badge-off  { background: #3b1515; color: #f87171; }
    .speed-bar { display: flex; align-items: center; gap: 0.5rem; }
    .bar { height: 6px; border-radius: 3px; background: #0ea5e9; transition: width 0.3s; }
    .empty { color: #475569; text-align: center; padding: 3rem; font-size: 0.875rem; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .stat { background: #0f172a; border-radius: 0.5rem; padding: 1rem; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #a78bfa; }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
    button { padding: 0.4rem 1rem; border-radius: 0.375rem; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; border: 1px solid #334155; background: #1e293b; color: #94a3b8; }
    button:hover { background: #334155; color: #e2e8f0; }
  </style>
</head>
<body>

  <h1>📡 Telemetry Consumer</h1>
  <p class="subtitle">Live events from Kafka &larr; topic: <code>vehicle-telemetry</code></p>

  <div class="card">
    <div class="stats">
      <div class="stat"><div class="stat-value" id="totalCount">0</div><div class="stat-label">Total Events</div></div>
      <div class="stat"><div class="stat-value" id="vehicleCount">0</div><div class="stat-label">Unique Vehicles</div></div>
      <div class="stat"><div class="stat-value" id="avgSpeed">—</div><div class="stat-label">Avg Speed (km/h)</div></div>
    </div>
  </div>

  <div class="card">
    <div class="header-row">
      <h2>Live Events</h2>
      <div style="display:flex;align-items:center;gap:1rem">
        <button onclick="clearTable()">Clear</button>
        <div class="status">
          <div class="dot" id="dot"></div>
          <span id="statusText">Connecting…</span>
        </div>
      </div>
    </div>

    <p class="empty" id="empty">Waiting for events… make sure the producer is running.</p>
    <table id="eventTable" style="display:none">
      <thead><tr>
        <th>Vehicle</th><th>Speed</th><th>Fuel</th><th>Engine</th>
        <th>Lat / Lon</th><th>Time</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    let totalCount = 0;
    const vehicles = new Set();
    const speeds = [];
    const MAX_ROWS = 100;

    const evtSource = new EventSource('/api/events/stream');

    evtSource.onopen = () => {
      document.getElementById('dot').className = 'dot connected';
      document.getElementById('statusText').textContent = 'Connected';
    };

    evtSource.onerror = () => {
      document.getElementById('dot').className = 'dot error';
      document.getElementById('statusText').textContent = 'Reconnecting…';
    };

    evtSource.onmessage = (e) => {
      let ev;
      try { ev = JSON.parse(e.data); } catch { return; }
      addRow(ev);
      updateStats(ev);
    };

    function addRow(ev) {
      totalCount++;
      document.getElementById('empty').style.display = 'none';
      document.getElementById('eventTable').style.display = 'table';
      const tbody = document.getElementById('tbody');

      const badgeClass = ev.engineStatus === 'ON' ? 'badge-on' : ev.engineStatus === 'IDLE' ? 'badge-idle' : 'badge-off';
      const speedPct = Math.min(100, (ev.speed / 150) * 100).toFixed(0);
      const tr = document.createElement('tr');
      tr.className = 'new-row';
      tr.innerHTML = `
        <td><strong>${ev.vehicleId}</strong></td>
        <td><div class="speed-bar">
          <div class="bar" style="width:${speedPct}px;max-width:80px"></div>
          <span>${ev.speed.toFixed(1)}</span>
        </div></td>
        <td>${ev.fuelLevel.toFixed(1)}%</td>
        <td><span class="badge ${badgeClass}">${ev.engineStatus}</span></td>
        <td>${ev.latitude.toFixed(4)}, ${ev.longitude.toFixed(4)}</td>
        <td>${new Date(ev.timestamp).toLocaleTimeString()}</td>`;
      tbody.insertBefore(tr, tbody.firstChild);
      setTimeout(() => tr.classList.remove('new-row'), 1000);
      if (tbody.rows.length > MAX_ROWS) tbody.deleteRow(tbody.rows.length - 1);
    }

    function updateStats(ev) {
      document.getElementById('totalCount').textContent = totalCount;
      vehicles.add(ev.vehicleId);
      document.getElementById('vehicleCount').textContent = vehicles.size;
      speeds.push(ev.speed);
      if (speeds.length > 500) speeds.shift();
      const avg = speeds.reduce((a, b) => a + b, 0) / speeds.length;
      document.getElementById('avgSpeed').textContent = avg.toFixed(1);
    }

    function clearTable() {
      document.getElementById('tbody').innerHTML = '';
      document.getElementById('eventTable').style.display = 'none';
      document.getElementById('empty').style.display = '';
      totalCount = 0; vehicles.clear(); speeds.length = 0;
      document.getElementById('totalCount').textContent = '0';
      document.getElementById('vehicleCount').textContent = '0';
      document.getElementById('avgSpeed').textContent = '—';
    }
  </script>
</body>
</html>
