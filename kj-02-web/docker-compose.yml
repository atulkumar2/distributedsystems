services:
  # ── Producer web app (http://localhost:8081) ──────────────────────────────────
  producer-app:
    build:
      context: .                            # kj-02-web/ — includes telemetry-model sources
      dockerfile: producer-app/Dockerfile
    container_name: telemetry-producer
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - default
      - shared

  # ── Consumer web app (http://localhost:8082) ──────────────────────────────────
  consumer-app:
    build:
      context: .                            # kj-02-web/ — shared context for consistency
      dockerfile: consumer-app/Dockerfile
    container_name: telemetry-consumer
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - default
      - shared

networks:
  shared:
    external: true
    name: ds-shared
