<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" role="img" aria-labelledby="title desc">
  <title id="title">Stage 2 data flow</title>
  <desc id="desc">Producer UI sends telemetry to Kafka, and Consumer UI reads from Kafka and streams updates to the browser.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="100%" stop-color="#f7efe4"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9a5a18"/>
    </marker>
  </defs>
  <rect width="820" height="240" rx="28" fill="url(#bg)"/>
  <g font-family="'Trebuchet MS', 'Segoe UI', sans-serif">
    <rect x="34" y="78" width="170" height="84" rx="18" fill="#15243a"/>
    <text x="119" y="112" fill="#fff" font-size="18" text-anchor="middle" font-weight="700">Producer UI</text>
    <text x="119" y="136" fill="#c7d3e3" font-size="12" text-anchor="middle">REST form + random send</text>

    <rect x="322" y="68" width="174" height="104" rx="22" fill="#cd5c08"/>
    <text x="409" y="105" fill="#fff" font-size="22" text-anchor="middle" font-weight="700">Kafka</text>
    <text x="409" y="130" fill="#ffe7d0" font-size="13" text-anchor="middle">vehicle-telemetry</text>
    <text x="409" y="150" fill="#ffe7d0" font-size="13" text-anchor="middle">topic stream</text>

    <rect x="614" y="78" width="170" height="84" rx="18" fill="#1d3557"/>
    <text x="699" y="112" fill="#fff" font-size="18" text-anchor="middle" font-weight="700">Consumer UI</text>
    <text x="699" y="136" fill="#c8d7ec" font-size="12" text-anchor="middle">Kafka consumer + SSE</text>

    <path d="M204 120 H312" stroke="#9a5a18" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M496 120 H604" stroke="#9a5a18" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

    <text x="246" y="108" fill="#7b5d46" font-size="11" font-weight="700">publish</text>
    <text x="545" y="108" fill="#7b5d46" font-size="11" font-weight="700">consume + stream</text>
  </g>
</svg>
