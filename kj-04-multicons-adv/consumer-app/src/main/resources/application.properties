spring.application.name=telemetry-consumer
server.port=8082

# Kafka bootstrap — override via env var SPRING_KAFKA_BOOTSTRAP_SERVERS when running in Docker
spring.kafka.bootstrap-servers=localhost:9092

# Use a distinct group-id from web-apps to avoid offset conflicts when both stacks run simultaneously
spring.kafka.consumer.group-id=vehicle-telemetry-web-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# earliest: pick up messages sent before the consumer started (good for demos)
spring.kafka.consumer.auto-offset-reset=earliest

telemetry.topic=vehicle-telemetry
