services:

  # ── Apache Kafka (KRaft, single node) ─────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka-local
    ports:
      # 9092  → exposed to the Docker host so the Java app can reach localhost:9092
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two data listeners:
      #   PLAINTEXT_HOST  – used by Java apps on the host machine (localhost:9092)
      #   PLAINTEXT       – used by containers on the same Docker network (kafka:29092)
      KAFKA_LISTENERS: PLAINTEXT_HOST://:9092,PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kafka UI  ──────────────────────────────────────────────────────────────
  # Web dashboard: http://localhost:8080
  # Browse topics, partitions, offsets, consumer groups, and live messages.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      # Display name shown in the UI sidebar
      KAFKA_CLUSTERS_0_NAME: vehicle-telemetry-local
      # kafka-ui talks to Kafka over the internal Docker network (port 29092, not 9092)
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      # Enables the cluster config to be edited through the UI as well
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
